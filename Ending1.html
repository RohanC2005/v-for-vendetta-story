<h2>ENDING — THE SUCCESSOR</h2>

<p>The train roars forward beneath Parliament.</p>
<p>Above the city thousands gather wearing identical masks. When the explosion finally comes, the building collapses in flames.</p>
<p>Evey watches from the crowd.</p>
<p>The mask rests in her hands.</p>
<p>The idea survives.</p>
